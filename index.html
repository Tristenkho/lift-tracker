<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFT">
<meta name="theme-color" content="#0a0a0a">
<title>LIFT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--card:#111;--border:#1e1e1e;--border2:#2a2a2a;
  --text:#f0ede8;--muted:#555;--accent:#e8f55a;
  --accent-dim:rgba(232,245,90,0.15);
  --safe:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px);
}
html,body{height:100%;width:100%;margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'DM Mono','Courier New',monospace;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;overflow:hidden}
#app{max-width:480px;width:100%;height:100%;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}
.screen{display:none;flex-direction:column;flex:1;min-height:0}
.screen.active{display:flex}
.scroll-body{flex:1 1 auto;overflow-y:auto;padding:12px 16px 24px;-webkit-overflow-scrolling:touch;min-height:0}
::-webkit-scrollbar{display:none}
.header{padding:16px 20px 8px;padding-top:calc(16px + var(--safe-top));display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.header-right{font-size:12px;color:var(--muted)}
.nav{display:flex;background:#0a0a0a;border-top:1px solid #222;padding-bottom:max(20px, env(safe-area-inset-bottom));flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;padding:10px 4px;cursor:pointer;letter-spacing:0.3px}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5}
.nav-btn.active{color:var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.card-row{display:flex;justify-content:space-between;align-items:center}
.label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.muted{font-size:12px;color:var(--muted)}
.tag{display:inline-block;background:#1a1a1a;border:1px solid #252525;border-radius:6px;padding:3px 8px;font-size:11px;color:#888}
.btn{border:none;border-radius:14px;padding:15px 20px;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;width:100%;cursor:pointer;letter-spacing:0.3px}
.btn:active{opacity:0.75}
.btn-primary{background:var(--accent);color:#000}
.btn-secondary{background:#1a1a1a;color:var(--text);border:1.5px solid var(--border2)}
.btn-ghost{background:none;color:var(--muted);border:none;font-family:'DM Mono',monospace;font-size:13px;width:100%;padding:14px;cursor:pointer}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:10px;width:auto}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.day-card-info{flex:1;min-width:0}
.day-name{font-weight:500;font-size:15px;margin-bottom:4px}
.day-exercises{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-last{margin-top:6px}
.workout-header{padding:16px 16px 0;padding-top:calc(16px + var(--safe-top));flex-shrink:0}
.workout-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.workout-day-label{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.workout-ex-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;line-height:1.2}
.timer{font-size:24px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace}
.ex-counter{font-size:12px;color:var(--muted);text-align:right}
.progress-dots{display:flex;gap:5px;margin-bottom:14px}
.prog-dot{height:4px;flex:1;border-radius:2px;transition:background 0.3s}
.prog-dot.done{background:var(--accent)}
.prog-dot.current{background:rgba(232,245,90,0.4)}
.prog-dot.todo{background:#222}
.ex-stats{display:flex;margin-bottom:14px}
.ex-stat{flex:1;background:var(--card);border:1px solid var(--border);padding:10px;text-align:center}
.ex-stat:first-child{border-radius:12px 0 0 12px}
.ex-stat:last-child{border-radius:0 12px 12px 0}
.ex-stat+.ex-stat{border-left:none}
.ex-stat-val{font-size:20px;font-weight:500}
.ex-stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.accent{color:var(--accent)}
.rest-banner{background:var(--accent-dim);border:1px solid rgba(232,245,90,0.3);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.rest-time{font-size:28px;font-weight:500;color:var(--accent)}
.rest-skip{background:none;border:1px solid rgba(232,245,90,0.4);border-radius:8px;color:var(--accent);font-family:'DM Mono',monospace;font-size:12px;padding:6px 12px;cursor:pointer}
.sets-header{display:grid;grid-template-columns:24px 1fr 1fr 36px 28px;gap:8px;margin-bottom:6px;padding:0 2px}
.sets-header span{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-align:center}
.set-row{display:grid;grid-template-columns:24px 1fr 1fr 36px 28px;gap:8px;align-items:center;margin-bottom:8px}
.set-num{font-size:13px;color:var(--muted);text-align:center}
.num-input{background:#141414;border:1.5px solid var(--border2);color:var(--text);border-radius:10px;padding:12px 6px;font-family:'DM Mono',monospace;font-size:17px;width:100%;text-align:center;-webkit-appearance:none;transition:border-color 0.15s}
.num-input:focus{outline:none;border-color:var(--accent)}
.num-input.done{border-color:rgba(232,245,90,0.5);background:rgba(232,245,90,0.05)}
.done-toggle{width:36px;height:36px;border-radius:50%;border:2px solid #2a2a2a;background:transparent;color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s}
.done-toggle.done{background:var(--accent);border-color:var(--accent);color:#000}
.remove-btn{background:none;border:none;color:#333;font-size:20px;cursor:pointer;padding:0;text-align:center;line-height:1}
.log-entry{padding:10px 0;border-top:1px solid #1a1a1a}
.log-entry:first-child{border-top:none}
.log-ex-name{font-size:13px;margin-bottom:4px}
.log-tags{display:flex;gap:6px;flex-wrap:wrap}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px}
.pr-name{font-size:13px}
.pr-val{font-size:18px;font-weight:500;color:var(--accent);font-family:'DM Mono',monospace}
.empty{text-align:center;padding:48px 24px;color:var(--muted);font-size:14px}
.export-row{display:flex;justify-content:flex-end;margin-bottom:14px}
.export-btn{background:#1a1a1a;border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:7px 14px;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer}
.btn-edit{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:9px 12px;font-size:12px;border-radius:10px;width:auto;margin-right:8px}
.edit-ex-row{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.edit-ex-name{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.edit-ex-name.expanded{white-space:normal;overflow:visible;text-overflow:clip}
.edit-btn{background:#1a1a1a;border:1px solid var(--border2);color:var(--muted);width:36px;height:36px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.edit-btn:active{background:#252525}
.edit-btn.danger{color:#e55}
.add-ex-list{max-height:50vh;overflow-y:auto;margin-bottom:12px}
.add-ex-item{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
.add-ex-item:last-child{border-bottom:none}
.add-ex-name{font-size:13px}
.text-input{background:#141414;border:1.5px solid var(--border2);color:var(--text);border-radius:10px;padding:12px 14px;font-family:'DM Mono',monospace;font-size:15px;width:100%;-webkit-appearance:none}
.text-input:focus{outline:none;border-color:var(--accent)}
.text-input::placeholder{color:#444}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;display:block}
.program-ex-row{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.program-ex-name{flex:1;font-size:13px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.program-ex-name.expanded{white-space:normal;overflow:visible;text-overflow:clip}
.program-ex-config{display:flex;gap:6px;align-items:center}
.mini-input{background:#141414;border:1.5px solid var(--border2);color:var(--text);border-radius:8px;padding:8px 4px;font-family:'DM Mono',monospace;font-size:14px;width:48px;text-align:center;-webkit-appearance:none}
.mini-input:focus{outline:none;border-color:var(--accent)}
.mini-label{font-size:10px;color:var(--muted)}
.program-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px}
.program-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.program-card-name{font-weight:500;font-size:15px}
.program-card-meta{font-size:11px;color:var(--muted)}
.program-card-actions{display:flex;gap:8px}
.custom-tag{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(232,245,90,0.3);border-radius:6px;padding:2px 8px;font-size:10px;letter-spacing:0.5px}
.lib-ex-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.lib-ex-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lib-ex-name{font-size:14px;font-weight:500}
.lib-ex-stats{display:flex;gap:12px}
.lib-ex-stat{display:flex;align-items:center;gap:4px}
.lib-ex-stat input{width:44px}
.lib-ex-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase}
.lib-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.log-entry-header{display:flex;justify-content:space-between;align-items:center}
.log-edit-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:4px 8px}
.log-session-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.pr-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0;margin-bottom:8px}
.pr-row-edit{display:flex;justify-content:space-between;align-items:center;padding:13px 16px}
.pr-edit-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:4px}
.pr-input{background:#141414;border:1.5px solid var(--border2);color:var(--accent);border-radius:8px;padding:6px 8px;font-family:'DM Mono',monospace;font-size:16px;width:70px;text-align:center}
.pr-input:focus{outline:none;border-color:var(--accent)}
.recalc-row{display:flex;justify-content:flex-end;margin-bottom:14px}
</style>
</head>
<body>
<div id="app">

<div class="screen active" id="screen-home">
  <div class="header">
    <div class="logo">LIFT<span>.</span></div>
    <div class="header-right" id="home-date"></div>
  </div>
  <div class="scroll-body">
    <div class="label">Your Program</div>
    <div id="program-list"></div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="goHome()"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Workout</button>
    <button class="nav-btn" onclick="goPrograms()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Programs</button>
    <button class="nav-btn" onclick="goLibrary()"><svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 012-2h12a2 2 0 012 2v14"/><path d="M4 19h16"/><path d="M12 3v16"/></svg>Library</button>
    <button class="nav-btn" onclick="goLog()"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/></svg>Log</button>
    <button class="nav-btn" onclick="goPRs()"><svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 1012 0V2z"/></svg>PRs</button>
  </nav>
</div>

<div class="screen" id="screen-workout">
  <div class="workout-header">
    <div class="workout-top">
      <div>
        <div class="workout-day-label" id="w-day-label"></div>
        <div class="workout-ex-name" id="w-ex-name"></div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="timer" id="w-timer">00:00</div>
        <div class="ex-counter" id="w-counter"></div>
      </div>
    </div>
    <div class="progress-dots" id="w-progress"></div>
    <div class="ex-stats" id="w-stats"></div>
    <div id="rest-banner" style="display:none" class="rest-banner">
      <div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px">Rest</div>
        <div class="rest-time" id="rest-countdown"></div>
      </div>
      <button class="rest-skip" onclick="skipRest()">Skip &#8594;</button>
    </div>
  </div>
  <div class="scroll-body" id="w-scroll">
    <div class="sets-header">
      <span>#</span><span>Weight</span><span>Reps</span><span>Done</span><span></span>
    </div>
    <div id="sets-container"></div>
    <button class="btn btn-secondary" style="margin-bottom:10px" onclick="addSet()">+ Add Set</button>
    <button class="btn btn-primary" id="next-btn" onclick="saveAndNext()">Save &amp; Next &#8594;</button>
    <button class="btn-ghost" onclick="endWorkoutEarly()">End Workout Early</button>
  </div>
</div>

<div class="screen" id="screen-log">
  <div class="header">
    <div class="logo">LIFT<span>.</span></div>
    <div class="header-right">History</div>
  </div>
  <div class="scroll-body">
    <div class="export-row">
      <button class="export-btn" onclick="exportCSV()">&#8595; Export CSV</button>
    </div>
    <div id="log-list"></div>
  </div>
  <nav class="nav">
    <button class="nav-btn" onclick="goHome()"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Workout</button>
    <button class="nav-btn" onclick="goPrograms()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Programs</button>
    <button class="nav-btn" onclick="goLibrary()"><svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 012-2h12a2 2 0 012 2v14"/><path d="M4 19h16"/><path d="M12 3v16"/></svg>Library</button>
    <button class="nav-btn active" onclick="goLog()"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/></svg>Log</button>
    <button class="nav-btn" onclick="goPRs()"><svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 1012 0V2z"/></svg>PRs</button>
  </nav>
</div>

<div class="screen" id="screen-prs">
  <div class="header">
    <div class="logo">LIFT<span>.</span></div>
    <div class="header-right">Records</div>
  </div>
  <div class="scroll-body">
    <div class="recalc-row">
      <button class="export-btn" onclick="recalculatePRs()">&#8635; Recalculate PRs</button>
    </div>
    <div class="label">Personal Records</div>
    <div id="pr-list"></div>
  </div>
  <nav class="nav">
    <button class="nav-btn" onclick="goHome()"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Workout</button>
    <button class="nav-btn" onclick="goPrograms()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Programs</button>
    <button class="nav-btn" onclick="goLibrary()"><svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 012-2h12a2 2 0 012 2v14"/><path d="M4 19h16"/><path d="M12 3v16"/></svg>Library</button>
    <button class="nav-btn" onclick="goLog()"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/></svg>Log</button>
    <button class="nav-btn active" onclick="goPRs()"><svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 1012 0V2z"/></svg>PRs</button>
  </nav>
</div>

<div class="screen" id="screen-edit">
  <div class="header">
    <div class="logo">LIFT<span>.</span></div>
    <div class="header-right" id="edit-day-label"></div>
  </div>
  <div class="scroll-body">
    <div class="label">Exercises</div>
    <div id="edit-ex-list"></div>
    <button class="btn btn-secondary" style="margin-bottom:10px" onclick="showAddExercise()">+ Add Exercise</button>
    <div id="add-ex-container" style="display:none">
      <div class="label" style="margin-top:16px">Available Exercises</div>
      <div class="card" style="padding:0">
        <div class="add-ex-list" id="add-ex-list"></div>
      </div>
    </div>
    <button class="btn btn-primary" style="margin-top:16px" onclick="saveEditAndGoHome()">Save Changes</button>
    <button class="btn-ghost" onclick="goHome()">Cancel</button>
  </div>
</div>

<div class="screen" id="screen-programs">
  <div class="header">
    <div class="logo">LIFT<span>.</span></div>
    <div class="header-right">Programs</div>
  </div>
  <div class="scroll-body">
    <div class="label">Default Programs</div>
    <div id="default-programs-list"></div>
    <div class="label" style="margin-top:20px">Custom Programs</div>
    <div id="custom-programs-list"></div>
    <button class="btn btn-primary" onclick="createNewProgram()">+ Create New Program</button>
  </div>
  <nav class="nav">
    <button class="nav-btn" onclick="goHome()"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Workout</button>
    <button class="nav-btn active" onclick="goPrograms()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Programs</button>
    <button class="nav-btn" onclick="goLibrary()"><svg viewBox="0 0 24 24"><path d="M4 19V5a2 2 0 012-2h12a2 2 0 012 2v14"/><path d="M4 19h16"/><path d="M12 3v16"/></svg>Library</button>

<script>
const DEFAULT_EXERCISES=[
  {name:"Flat DB Bench Press",sets:3,reps:8,inc:5},
  {name:"Incline DB Bench Press",sets:3,reps:8,inc:5},
  {name:"DB Overhead Press",sets:3,reps:8,inc:5},
  {name:"DB Lateral Raise",sets:3,reps:12,inc:0},
  {name:"DB Rear Delt Raise",sets:3,reps:12,inc:0},
  {name:"Ring Dips",sets:3,reps:8,inc:5},
  {name:"Pull-ups (Bar)",sets:3,reps:6,inc:5},
  {name:"Ring Rows",sets:3,reps:10,inc:0},
  {name:"Ring Pull-ups",sets:3,reps:6,inc:5},
  {name:"One-Arm DB Row",sets:3,reps:10,inc:5},
  {name:"DB RDL",sets:3,reps:8,inc:5},
  {name:"Goblet Squat",sets:3,reps:10,inc:5},
  {name:"Bulgarian Split Squat",sets:3,reps:8,inc:5},
  {name:"DB Step-Ups",sets:3,reps:10,inc:5},
  {name:"EZ Bar Curl",sets:3,reps:10,inc:5},
  {name:"DB Hammer Curl",sets:3,reps:10,inc:5},
  {name:"EZ Bar Skull Crushers",sets:3,reps:10,inc:5},
  {name:"Close-Grip Push-ups",sets:3,reps:12,inc:0},
  {name:"Ring Face Pull",sets:3,reps:12,inc:0},
  {name:"Hanging Leg Raise (Bar)",sets:3,reps:12,inc:0},
  {name:"Core (Plank / Ring Fallout)",sets:3,reps:60,inc:0}
];
const loadExercises=()=>{try{return JSON.parse(localStorage.getItem('lift_exercises_v1'))||DEFAULT_EXERCISES.map(e=>({...e}))}catch{return DEFAULT_EXERCISES.map(e=>({...e}))}};
const saveExercises=e=>localStorage.setItem('lift_exercises_v1',JSON.stringify(e));
let EXERCISES=loadExercises();
const DEFAULT_PROGRAM_HOME=[
  {label:"Day A: Shoulders + Chest/Triceps",exercises:["DB Overhead Press","DB Lateral Raise","Incline DB Bench Press","Flat DB Bench Press","EZ Bar Skull Crushers","Ring Dips"]},
  {label:"Day B: Shoulders + Back/Biceps",exercises:["DB Overhead Press","DB Rear Delt Raise","Pull-ups (Bar)","One-Arm DB Row","Ring Rows","EZ Bar Curl","DB Hammer Curl"]},
  {label:"Day C: Shoulders + Legs/Core",exercises:["DB Overhead Press","DB Lateral Raise","DB RDL","Goblet Squat","Bulgarian Split Squat","Hanging Leg Raise (Bar)","Core (Plank / Ring Fallout)"]}
];
const DEFAULT_PROGRAM_GYM=[
  {label:"Day A: Shoulders + Chest/Triceps",exercises:["Barbell Overhead Press","Cable Lateral Raise","Incline Barbell Bench Press","Barbell Bench Press","Cable Triceps Pushdown","Machine Chest Fly"]},
  {label:"Day B: Shoulders + Back/Biceps",exercises:["Barbell Overhead Press","Rear Delt Machine Fly","Lat Pulldown","Barbell Row","Seated Cable Row","EZ Bar Curl","Incline DB Curl"]},
  {label:"Day C: Shoulders + Legs/Core",exercises:["Barbell Overhead Press","DB Lateral Raise","Back Squat","Romanian Deadlift","Leg Press","Lying Leg Curl","Cable Crunch"]}
];
const LIFT_MODE=(localStorage.getItem('lift_mode_v1')==='gym'?'gym':'home');
const DEFAULT_PROGRAM=LIFT_MODE==='gym'?DEFAULT_PROGRAM_GYM:DEFAULT_PROGRAM_HOME;
const loadProgram=()=>{
  const toExerciseObj=e=>{
    const name=typeof e==='string'?e:(e&&typeof e.name==='string'?e.name:'');
    const lib=EXERCISES.find(x=>x.name===name)||{};
    return {
      name,
      sets:typeof e==='object'&&e&&Number.isFinite(e.sets)?e.sets:(lib.sets||3),
      reps:typeof e==='object'&&e&&Number.isFinite(e.reps)?e.reps:(lib.reps||8)
    };
  };
  const normalizeDays=days=>(Array.isArray(days)?days:[]).map(d=>({
    label:d?.label||'',
    exercises:(Array.isArray(d?.exercises)?d.exercises:[]).map(toExerciseObj).filter(ex=>ex.name)
  }));
  try{
    const saved=JSON.parse(localStorage.getItem('lift_program_v2'));
    if(saved){
      const normalized=normalizeDays(saved);
      saveProgram(normalized);
      return normalized;
    }
    // Migrate from v1 (string arrays) or use defaults
    const v1=JSON.parse(localStorage.getItem('lift_program_v1'));
    if(v1){
      const normalized=normalizeDays(v1);
      saveProgram(normalized);
      return normalized;
    }
    return DEFAULT_PROGRAM.map(d=>({label:d.label,exercises:d.exercises.map(name=>({name,sets:3,reps:8}))}));
  }catch{
    return DEFAULT_PROGRAM.map(d=>({label:d.label,exercises:d.exercises.map(name=>({name,sets:3,reps:8}))}));
  }
};
const saveProgram=p=>localStorage.setItem('lift_program_v2',JSON.stringify(p));
let PROGRAM=loadProgram();
const REST_SECS=90;
const loadLog=()=>{try{return JSON.parse(localStorage.getItem('lift_log_v1')||'[]')}catch{return[]}};
const saveLog=l=>localStorage.setItem('lift_log_v1',JSON.stringify(l));
const loadPRs=()=>{try{return JSON.parse(localStorage.getItem('lift_pr_v1')||'{}')}catch{return{}}};
const savePRs=p=>localStorage.setItem('lift_pr_v1',JSON.stringify(p));
const loadCustomPrograms=()=>{
  const toExerciseObj=e=>{
    const name=typeof e==='string'?e:(e&&typeof e.name==='string'?e.name:'');
    const lib=EXERCISES.find(x=>x.name===name)||{};
    return {
      name,
      sets:typeof e==='object'&&e&&Number.isFinite(e.sets)?e.sets:(lib.sets||3),
      reps:typeof e==='object'&&e&&Number.isFinite(e.reps)?e.reps:(lib.reps||8)
    };
  };
  try{
    const raw=JSON.parse(localStorage.getItem('lift_custom_programs_v1')||'[]');
    const normalized=(Array.isArray(raw)?raw:[]).map(p=>({
      name:p?.name||'',
      exercises:(Array.isArray(p?.exercises)?p.exercises:[]).map(toExerciseObj).filter(ex=>ex.name)
    }));
    saveCustomPrograms(normalized);
    return normalized;
  }catch{return[]}
};
const saveCustomPrograms=p=>localStorage.setItem('lift_custom_programs_v1',JSON.stringify(p));
let wlog=loadLog(),prs=loadPRs(),customPrograms=loadCustomPrograms();
let currentDay=null,activeIdx=0,wsets=[],currentCustomProgram=null;
let timerIv=null,elapsed=0,restIv=null,restLeft=0;
const fmtTime=s=>String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
const fmtDate=iso=>new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
const todayStr=()=>new Date().toISOString().slice(0,10);
const getLastW=name=>{const e=wlog.filter(x=>x.exercise===name&&x.weight>0);return e.length?e[e.length-1].weight:''};
const getEx=name=>EXERCISES.find(e=>e.name===name)||{};
const vibe=p=>{try{if(navigator.vibrate)navigator.vibrate(p)}catch{}};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
function goHome(){showScreen('home');renderHome()}
function goLog(){showScreen('log');renderLog()}
function goPRs(){showScreen('prs');renderPRs()}
function goPrograms(){showScreen('programs');renderPrograms()}
function goLibrary(){showScreen('library');renderLibrary()}

function renderHome(){
  document.getElementById('home-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const list=document.getElementById('program-list');
  list.innerHTML='';
  PROGRAM.forEach((day,idx)=>{
    const exNames=day.exercises.map(e=>typeof e==='string'?e:e.name);
    const entries=wlog.filter(e=>e.day===day.label);
    const lastDate=entries.length?entries[entries.length-1].date:null;
    const d=document.createElement('div');
    d.className='day-card';
    d.innerHTML=`
      <div class="day-card-info">
        <div class="day-name">${day.label}</div>
        <div class="day-exercises">${exNames.slice(0,3).join(' · ')}${exNames.length>3?' ···':''}</div>
        ${lastDate?`<div class="day-last"><span class="tag">Last: ${fmtDate(lastDate)}</span></div>`:''}
      </div>
      <button class="btn btn-primary btn-sm" onclick="startWorkout('${day.label}')">Start &#8594;</button>`;
    list.appendChild(d);
  });
  customPrograms.forEach((prog,idx)=>{
    const exNames=prog.exercises.map(e=>typeof e==='string'?e:e.name);
    const entries=wlog.filter(e=>e.day===prog.name);
    const lastDate=entries.length?entries[entries.length-1].date:null;
    const d=document.createElement('div');
    d.className='day-card';
    d.innerHTML=`
      <div class="day-card-info">
        <div class="day-name">${prog.name} <span class="custom-tag">CUSTOM</span></div>
        <div class="day-exercises">${exNames.slice(0,3).join(' · ')}${exNames.length>3?' ···':''}</div>
        ${lastDate?`<div class="day-last"><span class="tag">Last: ${fmtDate(lastDate)}</span></div>`:''}
      </div>
      <button class="btn btn-edit btn-sm" onclick="editCustomProgram(${idx})">Edit</button>
      <button class="btn btn-primary btn-sm" onclick="startCustomWorkout(${idx})">Start &#8594;</button>`;
    list.appendChild(d);
  });
}

function startWorkout(dayLabel){
  const prog=PROGRAM.find(d=>d.label===dayLabel);
  // Convert to custom program format for consistent handling
  currentCustomProgram={name:prog.label,exercises:prog.exercises.map(e=>typeof e==='string'?{name:e,sets:3,reps:8}:e)};
  currentDay={label:prog.label,exercises:currentCustomProgram.exercises.map(e=>e.name)};
  activeIdx=0;elapsed=0;
  initExerciseCustom();
  showScreen('workout');
  clearInterval(timerIv);
  timerIv=setInterval(()=>{elapsed++;document.getElementById('w-timer').textContent=fmtTime(elapsed)},1000);
}

function initExercise(){
  const name=currentDay.exercises[activeIdx];
  const info=getEx(name);
  const lw=getLastW(name);
  wsets=[{weight:lw!==''?String(lw):'',reps:'',done:false}];
  document.getElementById('w-day-label').textContent=currentDay.label;
  document.getElementById('w-ex-name').textContent=name;
  document.getElementById('w-counter').textContent=`${activeIdx+1} / ${currentDay.exercises.length}`;
  document.getElementById('w-progress').innerHTML=currentDay.exercises.map((_,i)=>{
    const c=i<activeIdx?'done':i===activeIdx?'current':'todo';
    return`<div class="prog-dot ${c}"></div>`;
  }).join('');
  const pr=prs[name];
  document.getElementById('w-stats').innerHTML=`
    <div class="ex-stat"><div class="ex-stat-val accent">${info.reps||'—'}</div><div class="ex-stat-label">Target</div></div>
    <div class="ex-stat"><div class="ex-stat-val">${info.sets||'—'}</div><div class="ex-stat-label">Sets</div></div>
    <div class="ex-stat"><div class="ex-stat-val">${pr?'&#127942; '+pr:'—'}</div><div class="ex-stat-label">PR</div></div>`;
  renderSets();
  stopRest();
  document.getElementById('next-btn').textContent=activeIdx<currentDay.exercises.length-1?'Save & Next \u2192':'Finish Workout \uD83C\uDF89';
  document.getElementById('w-scroll').scrollTo(0,0);
}

function renderSets(){
  document.getElementById('sets-container').innerHTML=wsets.map((s,i)=>`
    <div class="set-row">
      <div class="set-num">${i+1}</div>
      <input class="num-input${s.done?' done':''}" type="number" inputmode="decimal" placeholder="lbs" value="${s.weight}" oninput="wsets[${i}].weight=this.value">
      <input class="num-input${s.done?' done':''}" type="number" inputmode="numeric" placeholder="reps" value="${s.reps}" oninput="wsets[${i}].reps=this.value">
      <button class="done-toggle${s.done?' done':''}" onclick="toggleDone(${i})">${s.done?'&#10003;':'&#9675;'}</button>
      <button class="remove-btn" onclick="removeSet(${i})">&#215;</button>
    </div>`).join('');
}

function toggleDone(i){
  wsets[i].done=!wsets[i].done;
  vibe(wsets[i].done?[10,20,10]:[5]);
  renderSets();
  if(wsets[i].done)startRest();
}
function addSet(){const l=wsets[wsets.length-1];wsets.push({weight:l.weight,reps:'',done:false});renderSets()}
function removeSet(i){if(wsets.length===1)return;wsets.splice(i,1);renderSets()}

function startRest(){
  stopRest();restLeft=REST_SECS;
  document.getElementById('rest-banner').style.display='flex';
  document.getElementById('rest-countdown').textContent=fmtTime(restLeft);
  restIv=setInterval(()=>{
    restLeft--;
    document.getElementById('rest-countdown').textContent=fmtTime(restLeft);
    if(restLeft<=10)vibe([5]);
    if(restLeft<=0){stopRest();vibe([100,50,100])}
  },1000);
}
function stopRest(){clearInterval(restIv);const b=document.getElementById('rest-banner');if(b)b.style.display='none'}
function skipRest(){stopRest();vibe([10])}

function saveAndNext(){
  const name=currentDay.exercises[activeIdx];
  const entries=wsets.map((s,i)=>({
    date:todayStr(),day:currentDay.label,exercise:name,
    set:i+1,weight:parseFloat(s.weight)||0,reps:parseInt(s.reps)||0
  })).filter(e=>e.weight>0&&e.reps>0);
  wlog=[...wlog,...entries];saveLog(wlog);
  const ws=entries.map(e=>e.weight).filter(Boolean);
  if(ws.length){const max=Math.max(...ws);if(!prs[name]||max>prs[name]){prs[name]=max;savePRs(prs)}}
  vibe([15,30,15]);
  if(activeIdx<currentDay.exercises.length-1){
    activeIdx++;
    if(currentCustomProgram)initExerciseCustom();
    else initExercise();
  }
  else endWorkout();
}
function endWorkout(){clearInterval(timerIv);stopRest();currentCustomProgram=null;goHome()}
function endWorkoutEarly(){if(confirm('End workout early?'))endWorkout()}

function renderLog(){
  const list=document.getElementById('log-list');
  if(!wlog.length){list.innerHTML='<div class="empty">No workouts logged yet.<br>Start your first session!</div>';return}
  const groups=[];const seen=new Set();
  [...wlog].reverse().forEach(e=>{const k=e.date+'|'+e.day;if(!seen.has(k)){seen.add(k);groups.push({date:e.date,day:e.day})}});
  list.innerHTML=groups.slice(0,20).map(g=>{
    const entries=wlog.filter(e=>e.date===g.date&&e.day===g.day);
    const exNames=[...new Set(entries.map(e=>e.exercise))];
    const dateEnc=encodeURIComponent(g.date);
    const dayEnc=encodeURIComponent(g.day);
    return`<div class="card">
      <div class="card-row" style="margin-bottom:12px"><span style="font-weight:500">${g.day}</span><span class="muted">${fmtDate(g.date)}</span></div>
      ${exNames.map(ex=>{
        const exEnc=encodeURIComponent(ex);
        const xs=entries.filter(e=>e.exercise===ex);
        const ws=xs.map(s=>s.weight).filter(Boolean);
        const maxW=ws.length?Math.max(...ws):0;
        const totalReps=xs.reduce((a,s)=>a+s.reps,0);
        const vol=xs.reduce((a,s)=>a+(s.weight*s.reps||0),0);
        return`<div class="log-entry">
          <div class="log-entry-header">
            <div class="log-ex-name">${ex}</div>
            <button class="log-edit-btn" onclick="editLogEntry('${dateEnc}','${dayEnc}','${exEnc}')">&#9998;</button>
          </div>
          <div class="log-tags">
            <span class="tag">${xs.length} sets</span>
            ${maxW?`<span class="tag">${maxW} lbs top</span>`:''}
            ${totalReps?`<span class="tag">${totalReps} reps</span>`:''}
            ${vol?`<span class="tag">${vol} vol</span>`:''}
          </div></div>`;
      }).join('')}
      <div class="log-session-actions">
        <button class="btn btn-sm btn-secondary" style="color:#e55" onclick="deleteLogSession('${dateEnc}','${dayEnc}')">Delete Session</button>
      </div>
    </div>`;
  }).join('');
}

function renderPRs(){
  document.getElementById('pr-list').innerHTML=EXERCISES.map(ex=>{
    const pr=prs[ex.name];
    const last=wlog.filter(e=>e.exercise===ex.name&&e.weight>0);
    const lw=last.length?last[last.length-1].weight:null;
    const nameEnc=encodeURIComponent(ex.name);
    return`<div class="pr-card"><div class="pr-row-edit">
      <div><div class="pr-name">${ex.name}</div>${lw?`<div class="muted" style="margin-top:2px">Last: ${lw} lbs</div>`:''}</div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="color:var(--muted);font-size:12px">PR:</span>
        <input type="number" class="pr-input" value="${pr||''}" placeholder="—" onchange="updatePR('${nameEnc}',this.value)" inputmode="decimal">
        <span style="color:var(--muted);font-size:12px">lbs</span>
      </div>
    </div></div>`;
  }).join('');
}

function exportCSV(){
  if(!wlog.length){alert('No data to export yet.');return}
  const header='Date,Day,Exercise,Set,Weight (lbs),Reps,Volume\n';
  const rows=wlog.map(e=>`${e.date},${e.day},"${e.exercise}",${e.set},${e.weight},${e.reps},${e.weight*e.reps}`).join('\n');
  const blob=new Blob([header+rows],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='lift-log-'+todayStr()+'.csv';a.click();URL.revokeObjectURL(url);
}

let editingDayIdx=null;
function editDay(idx){
  editingDayIdx=idx;
  document.getElementById('edit-day-label').textContent=PROGRAM[idx].label;
  document.getElementById('add-ex-container').style.display='none';
  renderEditList();
  showScreen('edit');
}

function renderEditList(){
  const day=PROGRAM[editingDayIdx];
  document.getElementById('edit-ex-list').innerHTML=day.exercises.map((ex,i)=>`
    <div class="edit-ex-row">
      <div class="edit-ex-name" onclick="this.classList.toggle('expanded')">${typeof ex==='string'?ex:ex.name}</div>
      <button class="edit-btn" onclick="moveEx(${i},-1)" ${i===0?'disabled style="opacity:0.3"':''}>&#9650;</button>
      <button class="edit-btn" onclick="moveEx(${i},1)" ${i===day.exercises.length-1?'disabled style="opacity:0.3"':''}>&#9660;</button>
      <button class="edit-btn danger" onclick="removeEx(${i})">&#10005;</button>
    </div>`).join('');
}

function moveEx(idx,dir){
  const exs=PROGRAM[editingDayIdx].exercises;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=exs.length)return;
  [exs[idx],exs[newIdx]]=[exs[newIdx],exs[idx]];
  renderEditList();
}

function removeEx(idx){
  PROGRAM[editingDayIdx].exercises.splice(idx,1);
  renderEditList();
}

function showAddExercise(){
  const container=document.getElementById('add-ex-container');
  container.style.display=container.style.display==='none'?'block':'none';
  if(container.style.display==='block')renderAddList();
}

function renderAddList(){
  const current=PROGRAM[editingDayIdx].exercises;
  const available=EXERCISES.filter(e=>!current.some(ex=>(typeof ex==='string'?ex:ex.name)===e.name));
  document.getElementById('add-ex-list').innerHTML=available.length?available.map(ex=>`
    <div class="add-ex-item">
      <span class="add-ex-name">${ex.name}</span>
      <button class="btn btn-sm btn-secondary" onclick="addExToDay('${ex.name}')">Add</button>
    </div>`).join(''):'<div class="empty" style="padding:24px">All exercises added</div>';
}

function addExToDay(name){
  const lib=getEx(name);
  PROGRAM[editingDayIdx].exercises.push({name,sets:lib.sets||3,reps:lib.reps||8});
  renderEditList();
  renderAddList();
}

function saveEditAndGoHome(){
  saveProgram(PROGRAM);
  goHome();
}

// Custom Programs
let editingProgramIdx=null;
let editingDefaultProgram=false;
let programExercises=[];

function renderPrograms(){
  // Render default programs
  const defaultList=document.getElementById('default-programs-list');
  defaultList.innerHTML=PROGRAM.map((prog,idx)=>`
    <div class="program-card">
      <div class="program-card-header">
        <div>
          <div class="program-card-name">${prog.label}</div>
          <div class="program-card-meta">${prog.exercises.length} exercises</div>
        </div>
        <div class="program-card-actions">
          <button class="btn btn-edit btn-sm" onclick="editDefaultProgram(${idx})">Edit</button>
          <button class="btn btn-primary btn-sm" onclick="startWorkout('${prog.label}')">Start</button>
        </div>
      </div>
    </div>`).join('');

  // Render custom programs
  const list=document.getElementById('custom-programs-list');
  if(!customPrograms.length){
    list.innerHTML='<div class="empty" style="padding:24px 0">No custom programs yet.<br>Create your first one!</div>';
    return;
  }
  list.innerHTML=customPrograms.map((prog,idx)=>`
    <div class="program-card">
      <div class="program-card-header">
        <div>
          <div class="program-card-name">${prog.name} <span class="custom-tag">CUSTOM</span></div>
          <div class="program-card-meta">${prog.exercises.length} exercises</div>
        </div>
        <div class="program-card-actions">
          <button class="btn btn-edit btn-sm" onclick="editCustomProgram(${idx})">Edit</button>
          <button class="btn btn-primary btn-sm" onclick="startCustomWorkout(${idx})">Start</button>
        </div>
      </div>
    </div>`).join('');
}

function createNewProgram(){
  editingProgramIdx=null;
  editingDefaultProgram=false;
  programExercises=[];
  document.getElementById('program-name-input').value='';
  document.getElementById('create-program-header').textContent='New Program';
  document.getElementById('delete-program-btn').style.display='none';
  document.getElementById('program-add-ex-container').style.display='none';
  renderProgramExercises();
  showScreen('create-program');
}

function editDefaultProgram(idx){
  editingProgramIdx=idx;
  editingDefaultProgram=true;
  const prog=PROGRAM[idx];
  programExercises=prog.exercises.map(ex=>{
    const name=typeof ex==='string'?ex:ex.name;
    const lib=getEx(name);
    return {
      name,
      sets:Number.isFinite(ex&&ex.sets)?ex.sets:(lib.sets||3),
      reps:Number.isFinite(ex&&ex.reps)?ex.reps:(lib.reps||8)
    };
  });
  document.getElementById('program-name-input').value=prog.label;
  document.getElementById('create-program-header').textContent='Edit Program';
  document.getElementById('delete-program-btn').style.display='none'; // Can't delete default programs
  document.getElementById('program-add-ex-container').style.display='none';
  renderProgramExercises();
  showScreen('create-program');
}

function editCustomProgram(idx){
  editingProgramIdx=idx;
  editingDefaultProgram=false;
  const prog=customPrograms[idx];
  programExercises=prog.exercises.map(e=>{
    const name=typeof e==='string'?e:e.name;
    const lib=getEx(name);
    return {
      name,
      sets:Number.isFinite(e&&e.sets)?e.sets:(lib.sets||3),
      reps:Number.isFinite(e&&e.reps)?e.reps:(lib.reps||8)
    };
  });
  document.getElementById('program-name-input').value=prog.name;
  document.getElementById('create-program-header').textContent='Edit Program';
  document.getElementById('delete-program-btn').style.display='block';
  document.getElementById('program-add-ex-container').style.display='none';
  renderProgramExercises();
  showScreen('create-program');
}

function renderProgramExercises(){
  const list=document.getElementById('program-exercises-list');
  if(!programExercises.length){
    list.innerHTML='<div class="empty" style="padding:16px 0">No exercises added yet.</div>';
    return;
  }
  list.innerHTML=programExercises.map((ex,i)=>`
    <div class="program-ex-row">
      <div class="program-ex-name" onclick="this.classList.toggle('expanded')">${typeof ex==='string'?ex:ex.name}</div>
      <div class="program-ex-config">
        <input type="number" class="mini-input" value="${ex.sets}" oninput="programExercises[${i}].sets=parseInt(this.value)||0" min="1">
        <span class="mini-label">sets</span>
        <input type="number" class="mini-input" value="${ex.reps}" oninput="programExercises[${i}].reps=parseInt(this.value)||0" min="1">
        <span class="mini-label">reps</span>
      </div>
      <button class="edit-btn" onclick="moveProgramEx(${i},-1)" ${i===0?'disabled style="opacity:0.3"':''}>&#9650;</button>
      <button class="edit-btn" onclick="moveProgramEx(${i},1)" ${i===programExercises.length-1?'disabled style="opacity:0.3"':''}>&#9660;</button>
      <button class="edit-btn danger" onclick="removeProgramEx(${i})">&#10005;</button>
    </div>`).join('');
}

function moveProgramEx(idx,dir){
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=programExercises.length)return;
  [programExercises[idx],programExercises[newIdx]]=[programExercises[newIdx],programExercises[idx]];
  renderProgramExercises();
}

function removeProgramEx(idx){
  programExercises.splice(idx,1);
  renderProgramExercises();
}

function showAddExerciseToProgram(){
  const container=document.getElementById('program-add-ex-container');
  container.style.display=container.style.display==='none'?'block':'none';
  if(container.style.display==='block')renderProgramAddList();
}

function renderProgramAddList(){
  const currentNames=programExercises.map(e=>typeof e==='string'?e:e.name);
  const available=EXERCISES.filter(e=>!currentNames.includes(e.name));
  document.getElementById('program-add-ex-list').innerHTML=available.length?available.map(ex=>`
    <div class="add-ex-item">
      <span class="add-ex-name">${ex.name}</span>
      <button class="btn btn-sm btn-secondary" onclick="addExToProgram('${ex.name}',${ex.sets},${ex.reps})">Add</button>
    </div>`).join(''):'<div class="empty" style="padding:24px">All exercises added</div>';
}

function addExToProgram(name,sets,reps){
  programExercises.push({name,sets,reps});
  renderProgramExercises();
  renderProgramAddList();
}

function saveCustomProgram(){
  const name=document.getElementById('program-name-input').value.trim();
  if(!name){alert('Please enter a program name');return}
  if(!programExercises.length){alert('Please add at least one exercise');return}

  if(editingDefaultProgram){
    // Save to default program
    PROGRAM[editingProgramIdx]={label:name,exercises:programExercises.map(e=>({...e}))};
    saveProgram(PROGRAM);
  }else{
    // Save to custom programs
    const prog={name,exercises:programExercises.map(e=>({...e}))};
    if(editingProgramIdx!==null){
      customPrograms[editingProgramIdx]=prog;
    }else{
      customPrograms.push(prog);
    }
    saveCustomPrograms(customPrograms);
  }
  goPrograms();
}

function deleteCustomProgram(){
  if(!confirm('Delete this program?'))return;
  customPrograms.splice(editingProgramIdx,1);
  saveCustomPrograms(customPrograms);
  goPrograms();
}

function startCustomWorkout(idx){
  currentCustomProgram=customPrograms[idx];
  currentDay={label:currentCustomProgram.name,exercises:currentCustomProgram.exercises.map(e=>typeof e==='string'?e:e.name)};
  activeIdx=0;elapsed=0;
  initExerciseCustom();
  showScreen('workout');
  clearInterval(timerIv);
  timerIv=setInterval(()=>{elapsed++;document.getElementById('w-timer').textContent=fmtTime(elapsed)},1000);
}

function initExerciseCustom(){
  const raw=currentCustomProgram.exercises[activeIdx];
  const exData=typeof raw==='string'?{name:raw,sets:getEx(raw).sets||3,reps:getEx(raw).reps||8}:raw;
  const name=exData.name;
  const lw=getLastW(name);
  wsets=[{weight:lw!==''?String(lw):'',reps:'',done:false}];
  document.getElementById('w-day-label').textContent=currentDay.label;
  document.getElementById('w-ex-name').textContent=name;
  document.getElementById('w-counter').textContent=`${activeIdx+1} / ${currentDay.exercises.length}`;
  document.getElementById('w-progress').innerHTML=currentDay.exercises.map((_,i)=>{
    const c=i<activeIdx?'done':i===activeIdx?'current':'todo';
    return`<div class="prog-dot ${c}"></div>`;
  }).join('');
  const pr=prs[name];
  document.getElementById('w-stats').innerHTML=`
    <div class="ex-stat"><div class="ex-stat-val accent">${exData.reps||'—'}</div><div class="ex-stat-label">Target</div></div>
    <div class="ex-stat"><div class="ex-stat-val">${exData.sets||'—'}</div><div class="ex-stat-label">Sets</div></div>
    <div class="ex-stat"><div class="ex-stat-val">${pr?'&#127942; '+pr:'—'}</div><div class="ex-stat-label">PR</div></div>`;
  renderSets();
  stopRest();
  document.getElementById('next-btn').textContent=activeIdx<currentDay.exercises.length-1?'Save & Next \u2192':'Finish Workout \uD83C\uDF89';
  document.getElementById('w-scroll').scrollTo(0,0);
}

// Exercise Library
let editingExIdx=null;

function renderLibrary(){
  const list=document.getElementById('library-list');
  list.innerHTML=EXERCISES.map((ex,idx)=>{
    const isCustom=!DEFAULT_EXERCISES.find(d=>d.name===ex.name);
    return`<div class="lib-ex-card">
      <div class="lib-ex-header">
        <div class="lib-ex-name">${ex.name}${isCustom?' <span class="custom-tag">CUSTOM</span>':''}</div>
      </div>
      <div class="lib-ex-stats">
        <div class="lib-ex-stat">
          <input type="number" class="mini-input" value="${ex.sets}" onchange="updateExField(${idx},'sets',this.value)" min="1">
          <span class="lib-ex-stat-label">sets</span>
        </div>
        <div class="lib-ex-stat">
          <input type="number" class="mini-input" value="${ex.reps}" onchange="updateExField(${idx},'reps',this.value)" min="1">
          <span class="lib-ex-stat-label">reps</span>
        </div>
        <div class="lib-ex-stat">
          <input type="number" class="mini-input" value="${ex.inc}" onchange="updateExField(${idx},'inc',this.value)" min="0">
          <span class="lib-ex-stat-label">+lbs</span>
        </div>
      </div>
      ${isCustom?`<div class="lib-actions"><button class="btn btn-sm btn-secondary" onclick="editExerciseScreen(${idx})">Rename</button><button class="btn btn-sm btn-secondary" style="color:#e55" onclick="deleteExerciseFromLib(${idx})">Delete</button></div>`:''}
    </div>`;
  }).join('');
}

function updateExField(idx,field,value){
  EXERCISES[idx][field]=parseInt(value)||0;
  saveExercises(EXERCISES);
}

function createNewExercise(){
  editingExIdx=null;
  document.getElementById('ex-name-input').value='';
  document.getElementById('ex-sets-input').value='3';
  document.getElementById('ex-reps-input').value='8';
  document.getElementById('ex-inc-input').value='5';
  document.getElementById('create-ex-header').textContent='New Exercise';
  document.getElementById('delete-ex-btn').style.display='none';
  showScreen('create-exercise');
}

function editExerciseScreen(idx){
  editingExIdx=idx;
  const ex=EXERCISES[idx];
  document.getElementById('ex-name-input').value=ex.name;
  document.getElementById('ex-sets-input').value=ex.sets;
  document.getElementById('ex-reps-input').value=ex.reps;
  document.getElementById('ex-inc-input').value=ex.inc;
  document.getElementById('create-ex-header').textContent='Edit Exercise';
  document.getElementById('delete-ex-btn').style.display='block';
  showScreen('create-exercise');
}

function saveExercise(){
  const name=document.getElementById('ex-name-input').value.trim();
  const sets=parseInt(document.getElementById('ex-sets-input').value)||3;
  const reps=parseInt(document.getElementById('ex-reps-input').value)||8;
  const inc=parseInt(document.getElementById('ex-inc-input').value)||0;
  if(!name){alert('Please enter an exercise name');return}
  if(editingExIdx!==null){
    EXERCISES[editingExIdx]={name,sets,reps,inc};
  }else{
    if(EXERCISES.find(e=>e.name.toLowerCase()===name.toLowerCase())){
      alert('An exercise with this name already exists');return;
    }
    EXERCISES.push({name,sets,reps,inc});
  }
  saveExercises(EXERCISES);
  goLibrary();
}

function deleteExercise(){
  if(!confirm('Delete this exercise?'))return;
  EXERCISES.splice(editingExIdx,1);
  saveExercises(EXERCISES);
  goLibrary();
}

function deleteExerciseFromLib(idx){
  if(!confirm('Delete this exercise?'))return;
  EXERCISES.splice(idx,1);
  saveExercises(EXERCISES);
  renderLibrary();
}

// Log Editing
let editLogDate=null,editLogDay=null,editLogExercise=null,editLogSets=[];

function editLogEntry(dateEnc,dayEnc,exEnc){
  editLogDate=decodeURIComponent(dateEnc);
  editLogDay=decodeURIComponent(dayEnc);
  editLogExercise=decodeURIComponent(exEnc);
  const entries=wlog.filter(e=>e.date===editLogDate&&e.day===editLogDay&&e.exercise===editLogExercise);
  editLogSets=entries.map(e=>({weight:e.weight,reps:e.reps}));
  document.getElementById('edit-log-header').textContent=`${editLogDay} · ${fmtDate(editLogDate)}`;
  document.getElementById('edit-log-ex-name').textContent=editLogExercise;
  renderEditLogSets();
  showScreen('edit-log');
}

function renderEditLogSets(){
  document.getElementById('edit-log-sets').innerHTML=editLogSets.map((s,i)=>`
    <div class="set-row" style="grid-template-columns:24px 1fr 1fr 28px">
      <div class="set-num">${i+1}</div>
      <input class="num-input" type="number" inputmode="decimal" placeholder="lbs" value="${s.weight||''}" oninput="editLogSets[${i}].weight=parseFloat(this.value)||0">
      <input class="num-input" type="number" inputmode="numeric" placeholder="reps" value="${s.reps||''}" oninput="editLogSets[${i}].reps=parseInt(this.value)||0">
      <button class="remove-btn" onclick="removeLogSet(${i})">&#215;</button>
    </div>`).join('');
}

function addLogSet(){
  const last=editLogSets[editLogSets.length-1]||{weight:0,reps:0};
  editLogSets.push({weight:last.weight,reps:0});
  renderEditLogSets();
}

function removeLogSet(idx){
  if(editLogSets.length===1)return;
  editLogSets.splice(idx,1);
  renderEditLogSets();
}

function saveLogEdit(){
  // Remove old entries for this exercise/date/day
  wlog=wlog.filter(e=>!(e.date===editLogDate&&e.day===editLogDay&&e.exercise===editLogExercise));
  // Add updated entries
  editLogSets.forEach((s,i)=>{
    wlog.push({date:editLogDate,day:editLogDay,exercise:editLogExercise,set:i+1,weight:s.weight||0,reps:s.reps||0});
  });
  saveLog(wlog);
  goLog();
}

function deleteLogSession(dateEnc,dayEnc){
  const date=decodeURIComponent(dateEnc);
  const day=decodeURIComponent(dayEnc);
  if(!confirm(`Delete entire ${day} session from ${fmtDate(date)}?`))return;
  wlog=wlog.filter(e=>!(e.date===date&&e.day===day));
  saveLog(wlog);
  renderLog();
}

// PR Editing
function recalculatePRs(){
  if(!confirm('Recalculate all PRs from workout history? This will overwrite any manual edits.'))return;
  const newPRs={};
  wlog.forEach(e=>{
    if(e.weight>0){
      if(!newPRs[e.exercise]||e.weight>newPRs[e.exercise]){
        newPRs[e.exercise]=e.weight;
      }
    }
  });
  prs=newPRs;
  savePRs(prs);
  renderPRs();
}

function updatePR(nameEnc,value){
  const name=decodeURIComponent(nameEnc);
  const v=parseFloat(value);
  if(v>0){
    prs[name]=v;
  }else{
    delete prs[name];
  }
  savePRs(prs);
}

renderHome();
</script>
